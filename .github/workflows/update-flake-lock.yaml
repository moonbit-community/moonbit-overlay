# Weekly `nix flake update` followed by `nix flake check`. The companion
# `sync.yaml` only bumps the MoonBit version table (versions/), never the flake
# inputs (nixpkgs, treefmt-nix), so without this the lock drifts. A successful
# check is committed directly to master; a failed check leaves master untouched.
name: Update flake.lock

on:
  schedule:
    - cron: '0 3 * * 1' # Mondays 03:00 UTC
  workflow_dispatch:

concurrency:
  group: moonbit-overlay-master-writes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  lockfile:
    name: Update flake.lock
    runs-on: ubuntu-latest
    env:
      NIX_CONFIG: access-tokens = github.com=${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30

      - name: Update flake.lock
        id: update
        run: |
          nix flake update
          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check flake
        if: steps.update.outputs.changed == 'true'
        run: nix flake check --no-update-lock-file --print-build-logs

      - name: Commit and push flake.lock
        if: success() && steps.update.outputs.changed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "flake.lock: weekly update"
          git push origin HEAD:master
